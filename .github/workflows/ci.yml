# CI do PampaTickets: lint + testes + build em cada PR e push na main.
# O backend testa em SQLite in-memory (conftest define o env mínimo),
# então não precisa de Postgres nem de .env no runner.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Instalar dependências
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Testes (pytest)
        run: uv run pytest -q

  frontend:
    name: Frontend (eslint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Testes (vitest)
        run: npm test

      - name: Build de produção
        run: npm run build
